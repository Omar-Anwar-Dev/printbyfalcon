networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:

services:
  postgres-db:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: printbyfalcon
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 2g

  redis-cache:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    env_file: .env
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 512m

  meilisearch:
    image: getmeili/meilisearch:v1.6
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    env_file: .env
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 1g

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    env_file: .env
    volumes:
      - minio_data:/data
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 512m

  nestjs-api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    depends_on:
      - postgres-db
      - redis-cache
      - meilisearch
      - minio
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 512m

  nextjs-app:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    depends_on:
      - nestjs-api
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 1g

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - nextjs-app
      - nestjs-api
    networks:
      - app_network
