worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Performance ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/x-font-ttf
        application/vnd.ms-fontobject
        font/opentype
        image/svg+xml
        image/x-icon;

    keepalive_timeout 65;
    keepalive_requests 100;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # ── Buffer / timeout tuning ──────────────────────────────────
    client_body_buffer_size 16k;
    client_max_body_size 10m;            # allow CSV / image uploads
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # ── Hide Nginx version in error pages and Server header ─────
    server_tokens off;

    upstream nextjs {
        server nextjs-app:3000;
    }

    upstream nestjs {
        server nestjs-api:4000;
    }

    server {
        listen 80;
        server_name printbyfalcon.com www.printbyfalcon.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 80;
        server_name api.printbyfalcon.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name printbyfalcon.com www.printbyfalcon.com;

        ssl_certificate /etc/letsencrypt/live/printbyfalcon.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/printbyfalcon.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    server {
        listen 443 ssl http2;
        server_name api.printbyfalcon.com;

        ssl_certificate /etc/letsencrypt/live/printbyfalcon.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/printbyfalcon.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        location / {
            proxy_pass http://nestjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /payments/callback {
            proxy_pass http://nestjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
