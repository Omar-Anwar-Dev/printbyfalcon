networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:

services:
  postgres-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: printbyfalcon
      POSTGRES_USER: ${POSTGRES_USER:-falcon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-falconpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app_network

  redis-cache:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - app_network

  meilisearch:
    image: getmeili/meilisearch:v1.6
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterkey}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - app_network

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - app_network

  nestjs-api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    depends_on:
      - postgres-db
      - redis-cache
      - meilisearch
      - minio
    ports:
      - "4000:4000"
    networks:
      - app_network

  nextjs-app:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    depends_on:
      - nestjs-api
    ports:
      - "3000:3000"
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nextjs-app
      - nestjs-api
    networks:
      - app_network
